name: AI 更新文章

on:
  schedule:
    - cron: "10 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-24.04
    env:
      OPENAI_BASE_URL: https://new.misaka-network.top/v1
      OPENAI_API_KEY: ${{ secrets.AI_KEY }}

    steps:
      - name: 签出仓库
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装依赖
        run: npm install

      - name: 生成热点文章
        run: npm run ai:hot-post

      - name: 自动提交文章
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "更新博客内容"
          file_pattern: "source/_posts/*.md"
